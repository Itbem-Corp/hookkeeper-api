app = 'hookkeeper-api'
primary_region = 'ord'

[build]

[deploy]

[env]
  PORT = '8080'
  # REDIS_URL is expected at runtime and should be provided as a Fly secret.

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
